<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

        rel="stylesheet">

    <style type="text/css">
        body {
            margin: 0;
            font-family: 'Raleway', sans-serif;
            padding: 32px 0;
            background-color: black;
        }

        table {
            border-spacing: 0;
        }

        img {
            border: 0;
        }

        td {
            width: 160px;

        .wrapper {
            width: 100%;
            table-layout: fixed;
            padding-top: 32px;
        }

        }

        .code {
            font-family: 'Space Mono', monospace;
        }

        .title {

            margin-right: auto;
            width: 100%;
            table-layout: fixed;
        }

        td {
            text-align: center;
            padding: 0px;
            color: white;
        }

        .gmail-blend-screen {
            background: #000;
            mix-blend-mode: screen;
        }

        .gmail-blend-difference {
            background: #000;
            mix-blend-mode: difference;
        }

        .hairline {
            width: 80%;
            height: 0.5px;

        @media only screen and (min-width: 600px) {

        .copyright {

        a:link,

        }

<body style="background-image: url('https://realmoments.it/assets/background.png');">
